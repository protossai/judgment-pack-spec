name: Deploy site

# Keyless deploy via Workload Identity Federation (no service-account key, no secrets):
#   - Pull requests  -> build a noindex preview and deploy it to a Firebase preview channel.
#   - Push to main   -> build the production site and deploy both hosting targets live.
# The `production` environment lets you require a human approval in the repo settings,
# preserving the "promote the reviewed build" boundary for the specification site.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT: judgmentpack-spec
  BASE_URL: https://judgmentpack.org
  SPEC_SITE: judgmentpack-spec
  REDIRECT_SITE: judgmentpack-redirect
  WIF_PROVIDER: projects/350082883663/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOY_SA: gh-deploy@judgmentpack-spec.iam.gserviceaccount.com

jobs:
  preview:
    # Same-repo PRs only (fork PRs cannot mint the OIDC token).
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements-dev.txt
      - name: Build preview (noindex, no canonical)
        run: python web/build.py --environment preview
      - uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g firebase-tools
      - name: Deploy spec preview channel
        run: |
          firebase target:apply hosting spec "${SPEC_SITE}" --project "${GCP_PROJECT}"
          firebase hosting:channel:deploy "pr-${{ github.event.number }}" \
            --only spec --expires 7d --project "${GCP_PROJECT}" --non-interactive | tee /tmp/fb.txt
          {
            echo "### Specification preview";
            grep -Eo 'https://[a-zA-Z0-9._-]+\.web\.app[^ ]*' /tmp/fb.txt | head -1;
          } >> "$GITHUB_STEP_SUMMARY" || true

  production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements-dev.txt
      - name: Build production
        run: |
          python web/build.py --environment production \
            --base-url "${BASE_URL}" \
            --commit-sha "${{ github.sha }}" \
            --build-time "$(git show -s --format=%cI ${{ github.sha }})"
      - uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g firebase-tools
      - name: Deploy live (spec + redirect)
        run: |
          firebase target:apply hosting spec "${SPEC_SITE}" --project "${GCP_PROJECT}"
          firebase target:apply hosting redirect "${REDIRECT_SITE}" --project "${GCP_PROJECT}"
          firebase deploy --only hosting --project "${GCP_PROJECT}" --non-interactive
